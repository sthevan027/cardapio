# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Verifica se Pages está habilitado antes de continuar.
      # Importante: não falha o job se Pages não estiver configurado,
      # pra não quebrar o status da branch `main`.
      - name: Verificar configuração do GitHub Pages
        id: pages
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.request('GET /repos/{owner}/{repo}/pages', {
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              console.log('✓ GitHub Pages está configurado.');
              core.setOutput('enabled', 'true');
            } catch (error) {
              core.warning('GitHub Pages não está habilitado/sem permissão. Pulando deploy.');
              core.setOutput('enabled', 'false');
            }

      - name: Preparar diretório do site
        if: steps.pages.outputs.enabled == 'true'
        run: |
          mkdir -p site
          cp index.html site/
          cp style.css site/
          cp script.js site/
          cp pagamento.html site/
          cp pagamento.css site/
          cp pagamento.js site/
          cp LICENSE site/ || true
          cp README.md site/ || true

      - name: Setup Pages
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/configure-pages@v5
      - name: Upload artifact
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'
      - name: Deploy to GitHub Pages
        id: deployment
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/deploy-pages@v4
